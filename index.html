<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
    }

    form {
      display: grid;
      gap: .5rem;
      margin-bottom: 1rem;
      border: 1px solid #999;
      border-radius: 8px;
      padding: 1rem;
    }

    input,
    button {
      padding: .6rem;
      font-size: 1rem;
    }

    button {
      cursor: pointer;
    }

    .status {
      min-height: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .error {
      color: #d33;
    }

    .success {
      color: #2d7;
    }

    .hidden {
      display: none;
    }

    #auth-area,
    #confirm-area,
    #calendar-area {
      margin-bottom: 1.2rem;
    }

    #login-indicator {
      font-weight: 700;
      margin: .4rem 0 1rem;
    }
  </style>
</head>
<body>
  <h1>Calendário</h1>
  <p id="login-indicator" aria-live="polite">🔒 Não autenticado</p>

  <section id="auth-area">
    <h2>Tela inicial</h2>
    <p>Faça login para desbloquear o calendário.</p>

    <form id="signup-form">
      <h2>Criar conta</h2>
      <input id="signup-email" type="email" placeholder="Email" required>
      <input id="signup-password" type="password" placeholder="Senha (mínimo 6 caracteres)" minlength="6" required>
      <button type="submit">Cadastrar</button>
    </form>

    <form id="login-form">
      <h2>Entrar</h2>
      <input id="login-email" type="email" placeholder="Email" required>
      <input id="login-password" type="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </section>

  <section id="confirm-area" class="hidden">
    <h2>Confirmação de login</h2>
    <p id="confirm-text"></p>
    <button id="confirm-login-btn" type="button">Confirmar entrada</button>
  </section>

  <section id="calendar-area" class="hidden">
    <button id="logout-btn" type="button">Sair</button>
    <h2>Eventos</h2>
    <ul id="lista"></ul>
  </section>

  <p id="status" class="status" aria-live="polite"></p>

  <script type="module" src="./app.js"></script>
</body>
</html>
